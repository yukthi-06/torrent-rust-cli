name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2


      - name: Cargo Check
        run: cargo check --all-targets

      - name: Cargo Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Tests
        run: cargo test --all-targets

  build:
    name: Build - ${{ matrix.target }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
#          - target: x86_64-unknown-linux-gnu
#            os: ubuntu-latest
#            use_cross: false
#            bin_suffix: ""
#          - target: aarch64-unknown-linux-gnu
#            os: ubuntu-latest
#            use_cross: true
#            bin_suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            bin_suffix: ".exe"
#          - target: aarch64-pc-windows-msvc
#            os: windows-latest
#            use_cross: false
#            bin_suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross.git --rev 1b359f131cf04c45d3c87e7492c24430fb896172

      - name: Build Binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package Artifacts
        run: |
          mkdir -p dist
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          cp target/${{ matrix.target }}/release/torrentd${{ matrix.bin_suffix }} dist/torrentd-${{ matrix.target }}-${TIMESTAMP}${{ matrix.bin_suffix }}
          cp target/${{ matrix.target }}/release/torrent${{ matrix.bin_suffix }} dist/torrent-${{ matrix.target }}-${TIMESTAMP}${{ matrix.bin_suffix }}
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: torrent-${{ matrix.target }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
